<!DOCTYPE html>
<html>
<head>
  <title>Family Visa Intake Form</title>
</head>
<body>
  <h1>Family Visa Intake</h1>

  <label>Sponsor Name:</label>
  <input type="text" id="sponsor_name"><br><br>

  <label>Relationship:</label>
  <select id="relationship">
    <option>Wife</option>
    <option>Husband</option>
    <option>Child</option>
    <option>Parent</option>
  </select><br><br>

  <label>Passport Number:</label>
  <input type="text" id="passport_number"><br><br>

</body>
</html>
